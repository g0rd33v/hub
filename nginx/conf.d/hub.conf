# Hub v0.4 — Nginx config
# Prod: hub.labs.co
# Stage: stage.hub.labs.co

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=global:10m rate=300r/m;

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name hub.labs.co stage.hub.labs.co;

    # ACME challenge for certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Prod — hub.labs.co
server {
    listen 443 ssl;
    server_name hub.labs.co;
    http2 on;

    ssl_certificate     /etc/letsencrypt/live/hub.labs.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hub.labs.co/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # Global rate limit
    limit_req zone=global burst=50 nodelay;

    location / {
        proxy_pass         http://hub:3100;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection keep-alive;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Stricter limit for API
    location /drafts {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://hub:3100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Stage — stage.hub.labs.co
server {
    listen 443 ssl;
    server_name stage.hub.labs.co;
    http2 on;

    ssl_certificate     /etc/letsencrypt/live/hub.labs.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hub.labs.co/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    limit_req zone=global burst=50 nodelay;

    location / {
        proxy_pass         http://hub-stage:3101;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
