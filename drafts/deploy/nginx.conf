user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 768;
}

http {
    sendfile on;
    tcp_nopush on;
    types_hash_max_size 2048;
    server_tokens off;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    access_log /var/log/nginx/access.log;

    gzip on;

    # HTTP → HTTPS redirect
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # Main HTTPS site
    server {
        listen 443 ssl http2 default_server;
        listen [::]:443 ssl http2 default_server;
        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        server_name beta.labs.vc;

        ssl_certificate /etc/letsencrypt/live/beta.labs.vc/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/beta.labs.vc/privkey.pem;

        root /var/www/html;
        index index.html index.htm;

        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
        # Public live folders for projects: /live/<project>/...
        # Uses a symlink farm under /var/www/html/live/ → /var/www/beta.labs.vc/drafts/<p>/live
        location /live/ {
            alias /var/www/html/live/;
            autoindex on;
            autoindex_exact_size off;
            autoindex_localtime on;
            try_files $uri $uri/ $uri/index.html =404;
            add_header Cache-Control "no-store";
        }

        # Public drafts (working copy) browsing: /drafts-view/<project>/...
        location /drafts-view/ {
            alias /var/www/html/drafts-view/;
            autoindex on;
            autoindex_exact_size off;
            autoindex_localtime on;
            try_files $uri $uri/ =404;
            add_header Cache-Control "no-store";
        }


        # MAP/PAP activation URLs (proxied to drafts-receiver)
        # Portable drafts format: drafts_0_<token>
        location ~ ^/drafts_(server_|project_|agent_) {
            proxy_pass http://127.0.0.1:3100;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Legacy short-form activation URLs
        location ~ ^/(m|p|s|a)/ {
            proxy_pass http://127.0.0.1:3100;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Static drafts overview (public)
        location = /drafts/ {
            alias /var/www/html/drafts/;
            index index.html;
            try_files /index.html =404;
        }
        location = /drafts/index.html {
            alias /var/www/html/drafts/index.html;
        }
        location = /drafts/repos.json {
            alias /var/www/html/drafts/repos.json;
            add_header Cache-Control "no-store";
        }

        location = /drafts/about/ {
            alias /var/www/html/drafts/about/;
            index index.html;
            try_files /index.html =404;
        }
        location = /drafts/about/index.html {
            alias /var/www/html/drafts/about/index.html;
        }

        # API endpoints (proxied to drafts-receiver)
        location = /drafts/registry.json {
            default_type application/json;
            add_header Cache-Control "no-store";
        }

        location /drafts/ {
            proxy_pass http://127.0.0.1:3100;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            client_max_body_size 25m;
        }

        location / {
            try_files $uri $uri/ =404;
        }

        # Never cache status JSON
        location = /status/data.json {
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
            add_header Pragma "no-cache" always;
            expires -1;
        }

        # Short cache for HTML
        location ~* \.html$ {
            expires 5m;
            add_header Cache-Control "public, max-age=300";
        }

        # Longer cache for images, JS, CSS
        location ~* \.(jpg|jpeg|png|gif|ico|svg|woff2?|css|js)$ {
            expires 7d;
            add_header Cache-Control "public, max-age=604800";
        }
    }
}
